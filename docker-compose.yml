services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQLSERVER_PASSWORD:-TradeTurk!2026}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TradeTurk;User Id=sa;Password=${SQLSERVER_PASSWORD:-TradeTurk!2026};TrustServerCertificate=True"
      Frontend__BaseUrl: "http://localhost:5173"
      Jwt__Secret: "${JWT_SECRET:-TradeTurk-development-secret-key-change-me-please}"
    depends_on:
      - sqlserver
    ports:
      - "5129:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  sqlserver-data:
